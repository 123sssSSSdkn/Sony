<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="title">Sony LIV Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #player-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Channel Logo */
        #channel-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            max-width: 150px;
            max-height: 70px;
            pointer-events: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        #channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Back Button */
        #back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #back-button:hover {
            background: #ffd700;
            color: black;
        }

        /* Video Controls */
        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .control-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }

        .control-left, .control-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            background: rgba(255,215,0,0.3);
            border-color: #ffd700;
        }

        #volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        /* Loading Spinner */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 150;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffd700;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Unmute overlay */
        #unmute-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            cursor: pointer;
        }

        #unmute-overlay.hidden {
            display: none;
        }

        #unmute-button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid #ffd700;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
        }

        /* Error Message */
        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 53, 69, 0.95);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            min-width: 300px;
        }

        #error-msg button {
            margin: 10px;
            padding: 10px 20px;
            background: white;
            color: #dc3545;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        #error-msg button.secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        /* Format Badge */
        #format-badge {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid #ffd700;
            z-index: 150;
        }

        @media (max-width: 768px) {
            #channel-logo { max-width: 100px; max-height: 50px; }
            #back-button { padding: 8px 15px; font-size: 14px; }
            .btn { width: 35px; height: 35px; font-size: 18px; }
            #volume-slider { width: 60px; }
            #unmute-button { width: 60px; height: 60px; font-size: 30px; }
        }
    </style>
    <!-- Load both HLS.js and dash.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
    <div id="player-container">
        <video id="video" playsinline webkit-playsinline muted autoplay></video>
        
        <!-- Channel Logo -->
        <div id="channel-logo">
            <img id="logo-img" src="" alt="Channel Logo">
        </div>

        <!-- Back Button -->
        <a id="back-button" href="/">
            <span>←</span> Back to Channels
        </a>

        <!-- Format Badge -->
        <div id="format-badge"></div>

        <!-- Unmute overlay -->
        <div id="unmute-overlay">
            <div id="unmute-button">🔇</div>
        </div>

        <!-- Loading -->
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading stream...</div>
        </div>

        <!-- Error Message -->
        <div id="error-msg">
            <h3>⚠️ Stream Error</h3>
            <p id="error-text"></p>
            <button onclick="retryStream()">Retry</button>
            <button class="secondary" onclick="window.location.href='/'">Go Home</button>
        </div>

        <!-- Video Controls -->
        <div id="controls">
            <div class="control-bar">
                <div class="control-left">
                    <button id="play-btn" class="btn">⏸️</button>
                    <div id="volume-control">
                        <button id="mute-btn" class="btn">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>
                <div class="control-right">
                    <button id="fullscreen-btn" class="btn">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get channel data from URL
        const urlParams = new URLSearchParams(window.location.search);
        let channelData = null;
        
        try {
            const dataParam = urlParams.get('data');
            if (dataParam) {
                channelData = JSON.parse(decodeURIComponent(dataParam));
                console.log('Channel data loaded:', channelData);
            } else {
                throw new Error('No channel data provided');
            }
        } catch (e) {
            console.error('Error parsing channel data:', e);
            showError('Invalid channel data: ' + e.message);
        }

        // Player variables
        const video = document.getElementById('video');
        const logoImg = document.getElementById('logo-img');
        let hls = null;
        let dashPlayer = null;
        let controlsTimeout = null;

        // Set logo and title
        if (channelData) {
            if (channelData.logo) {
                logoImg.src = channelData.logo;
            }
            document.title = `${channelData.title || 'Stream'} - Sony LIV Player`;
        }

        // Detect stream format
        function getStreamFormat(url) {
            if (!url) return null;
            if (url.includes('.mpd') || url.includes('mpd?')) return 'dash';
            if (url.includes('.m3u8') || url.includes('m3u8?')) return 'hls';
            return 'unknown';
        }

        // Initialize player
        function initPlayer() {
            if (!channelData) {
                showError('No channel data available');
                return;
            }

            // Get stream URL (support both 'url' and 'mpd' fields)
            const streamUrl = channelData.url || channelData.mpd;
            
            if (!streamUrl) {
                showError('No stream URL available');
                return;
            }

            showLoading();
            
            const format = getStreamFormat(streamUrl);
            document.getElementById('format-badge').textContent = format ? format.toUpperCase() : 'UNKNOWN';
            
            console.log('Loading stream:', streamUrl);
            console.log('Format:', format);

            // Handle based on format
            if (format === 'hls') {
                loadHLSStream(streamUrl);
            } else if (format === 'dash') {
                loadDASHStream(streamUrl);
            } else {
                // Try native playback
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    hideLoading();
                    video.play().catch(e => {
                        console.log('Autoplay failed:', e);
                        document.getElementById('unmute-overlay').classList.remove('hidden');
                    });
                });
                video.addEventListener('error', () => {
                    showError('Unsupported stream format');
                });
            }

            setupControls();
        }

        function loadHLSStream(url) {
            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    enableWorker: true,
                    lowLatencyMode: true
                });

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    console.log('HLS manifest parsed');
                    hideLoading();
                    video.play().catch(e => {
                        console.log('Autoplay failed:', e);
                        document.getElementById('unmute-overlay').classList.remove('hidden');
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        showError('HLS Error: ' + data.details);
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    hideLoading();
                });
            } else {
                showError('HLS not supported in this browser');
            }
        }

        function loadDASHStream(url) {
            if (dashjs && dashjs.MediaPlayer) {
                dashPlayer = dashjs.MediaPlayer().create();
                
                // Set DRM if available
                if (channelData.drm && Object.keys(channelData.drm).length > 0) {
                    try {
                        const drmData = [];
                        for (const [keyId, key] of Object.entries(channelData.drm)) {
                            if (key !== 'null' && keyId !== 'null' && keyId !== 'undefined') {
                                drmData.push({
                                    scheme: 'com.widevine.alpha',
                                    keyId: keyId,
                                    key: key
                                });
                            }
                        }
                        
                        if (drmData.length > 0) {
                            console.log('Setting DRM protection');
                            dashPlayer.setProtectionData({
                                'com.widevine.alpha': {
                                    serverURL: 'https://proxy.uat.widevine.com/proxy',
                                    httpRequestHeaders: {
                                        'X-AxDRM-Message': drmData[0].key
                                    }
                                }
                            });
                        }
                    } catch (e) {
                        console.error('DRM setup error:', e);
                    }
                }

                // Set referer header if available
                if (channelData.referer) {
                    // Add custom headers through XHR
                    const xhrWithHeaders = (xhr) => {
                        xhr.setRequestHeader('Referer', channelData.referer);
                        if (channelData.userAgent) {
                            xhr.setRequestHeader('User-Agent', channelData.userAgent);
                        }
                    };
                    // This is a simplified approach - you may need to use dash.js extension for custom headers
                }

                dashPlayer.initialize(video, url, true);
                
                dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                    console.log('DASH stream initialized');
                    hideLoading();
                    video.play().catch(e => {
                        console.log('Autoplay failed:', e);
                        document.getElementById('unmute-overlay').classList.remove('hidden');
                    });
                });

                dashPlayer.on(dashjs.MediaPlayer.events.ERROR, (error) => {
                    console.error('DASH Error:', error);
                    showError('DASH Error: ' + (error.message || 'Unknown error'));
                });

            } else {
                showError('dash.js not loaded');
            }
        }

        function setupControls() {
            const controls = document.getElementById('controls');
            const playBtn = document.getElementById('play-btn');
            const muteBtn = document.getElementById('mute-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const unmuteOverlay = document.getElementById('unmute-overlay');

            // Auto-hide controls
            function showControls() {
                controls.classList.remove('hidden');
                resetControlsTimer();
            }

            function resetControlsTimer() {
                if (controlsTimeout) {
                    clearTimeout(controlsTimeout);
                }
                controlsTimeout = setTimeout(() => {
                    if (!video.paused) {
                        controls.classList.add('hidden');
                    }
                }, 3000);
            }

            document.addEventListener('mousemove', showControls);
            document.addEventListener('touchstart', showControls);

            // Play/Pause
            playBtn.addEventListener('click', togglePlay);
            video.addEventListener('play', () => {
                playBtn.textContent = '⏸️';
                unmuteOverlay.classList.add('hidden');
            });
            video.addEventListener('pause', () => playBtn.textContent = '▶️');

            // Volume
            muteBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', (e) => {
                video.volume = parseFloat(e.target.value);
                video.muted = false;
                updateMuteButton();
            });
            video.addEventListener('volumechange', updateMuteButton);

            // Fullscreen
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            // Unmute overlay
            unmuteOverlay.addEventListener('click', () => {
                video.muted = false;
                video.play();
                unmuteOverlay.classList.add('hidden');
                updateMuteButton();
            });

            updateMuteButton();
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
        }

        function updateMuteButton() {
            const muteBtn = document.getElementById('mute-btn');
            if (video.muted || video.volume === 0) {
                muteBtn.textContent = '🔇';
            } else if (video.volume < 0.5) {
                muteBtn.textContent = '🔉';
            } else {
                muteBtn.textContent = '🔊';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.getElementById('player-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            hideLoading();
            console.error('Error:', message);
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-msg').style.display = 'block';
        }

        function retryStream() {
            document.getElementById('error-msg').style.display = 'none';
            
            // Clean up existing players
            if (hls) {
                hls.destroy();
                hls = null;
            }
            if (dashPlayer) {
                dashPlayer.reset();
                dashPlayer = null;
            }
            
            initPlayer();
        }

        // Start player
        if (channelData) {
            initPlayer();
        }
    </script>
</body>
</html>
